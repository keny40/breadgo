services:
  postgres:
    image: postgres:16-alpine
    container_name: breadgo-postgres
    environment:
      POSTGRES_DB: breadgo
      POSTGRES_USER: breadgo
      POSTGRES_PASSWORD: breadgo_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U breadgo -d breadgo"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: ./backend
    container_name: breadgo-api
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: breadgo
      POSTGRES_USER: breadgo
      POSTGRES_PASSWORD: breadgo_password
      DATABASE_URL: postgresql+psycopg://breadgo:breadgo_password@postgres:5432/breadgo
      JWT_SECRET_KEY: local-development-secret-key-with-at-least-thirty-two-characters
      JWT_ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 30
      BACKEND_CORS_ORIGINS: http://localhost:3000,http://localhost:8080
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    command: >
      sh -c "alembic upgrade head &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000"

volumes:
  postgres_data:
